<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trip Guides</title>
  <style>
    :root{
      --bg:#f3f1ea;
      --surface:#fffdf8;
      --ink:#1f1e1d;
      --muted:#646059;
      --line:#ddd7c8;
      --accent:#5d7d67;
      --accent-soft:#e4ece3;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      background:var(--bg);
      color:var(--ink);
      font:17px/1.6 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    main{
      width:min(900px, calc(100% - 32px));
      margin:0 auto;
      padding:56px 0;
    }
    header{
      margin-bottom:28px;
      border-bottom:1px solid var(--line);
      padding-bottom:22px;
    }
    h1{
      margin:0 0 8px;
      font-size:clamp(2rem, 5vw, 3.2rem);
      line-height:1.05;
      letter-spacing:0;
    }
    p{margin:0;color:var(--muted)}
    .guides{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
      gap:14px;
      margin-top:24px;
    }
    .guide-card{
      display:block;
      min-height:160px;
      padding:22px;
      border:1px solid var(--line);
      border-radius:8px;
      background:var(--surface);
      color:inherit;
      transition:border-color .16s ease, transform .16s ease, box-shadow .16s ease;
    }
    .guide-card:hover,
    .guide-card:focus-within{
      border-color:var(--accent);
      box-shadow:0 12px 28px -22px rgba(31,30,29,.55);
      transform:translateY(-1px);
    }
    .guide-link{
      display:block;
      color:inherit;
      text-decoration:none;
    }
    .guide-link:focus-visible{
      border-radius:4px;
      outline:none;
      box-shadow:0 0 0 3px rgba(93,125,103,.28);
    }
    .label{
      display:inline-block;
      margin-bottom:14px;
      border-radius:999px;
      background:var(--accent-soft);
      color:#34533e;
      padding:4px 10px;
      font-size:.78rem;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.06em;
    }
    h2{
      margin:0 0 6px;
      font-size:1.25rem;
      line-height:1.2;
    }
    .share-btn{
      appearance:none;
      -webkit-appearance:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-top:18px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#f7faf5;
      color:#34533e;
      padding:8px 13px 8px 11px;
      font:inherit;
      font-size:.9rem;
      font-weight:700;
      cursor:pointer;
      transition:background .16s ease, border-color .16s ease, color .16s ease;
    }
    .share-btn:hover,
    .share-btn:focus-visible{
      border-color:var(--accent);
      background:var(--accent-soft);
      outline:none;
      box-shadow:0 0 0 3px rgba(93,125,103,.22);
    }
    .share-btn svg{
      width:17px;
      height:17px;
      flex:0 0 auto;
    }
    .share-btn.copied{
      border-color:#5d7d67;
      background:#e8f1e6;
      color:#284a35;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Trip Guides</h1>
      <p>A small online shelf for personal day-trip plans and printable guides.</p>
    </header>

    <section class="guides" aria-label="Available guides">
      <article class="guide-card">
        <a class="guide-link" href="./parc-omega/">
          <span class="label">Day trip</span>
          <h2>Parc Om&eacute;ga</h2>
          <p>Montebello wildlife safari plan with a 9:00 AM departure.</p>
        </a>
        <button class="share-btn" type="button" data-share-title="Parc Om&eacute;ga" data-share-url="./parc-omega/" aria-label="Share Parc Om&eacute;ga guide" onclick="shareTrip(this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 10.7l6.8-4.4M8.6 13.3l6.8 4.4"/></svg>
          <span class="share-label">Share</span>
        </button>
      </article>
      <article class="guide-card">
        <a class="guide-link" href="./upper-canada-village/">
          <span class="label">Day trip</span>
          <h2>Upper Canada Village</h2>
          <p>A relaxed heritage village plan with plenty of seated stops.</p>
        </a>
        <button class="share-btn" type="button" data-share-title="Upper Canada Village" data-share-url="./upper-canada-village/" aria-label="Share Upper Canada Village guide" onclick="shareTrip(this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 10.7l6.8-4.4M8.6 13.3l6.8 4.4"/></svg>
          <span class="share-label">Share</span>
        </button>
      </article>
    </section>
  </main>
  <script>
    async function copyLink(url){
      if(navigator.clipboard && window.isSecureContext){
        await navigator.clipboard.writeText(url);
        return;
      }
      var field = document.createElement('textarea');
      field.value = url;
      field.setAttribute('readonly', '');
      field.style.position = 'fixed';
      field.style.left = '-9999px';
      document.body.appendChild(field);
      field.select();
      document.execCommand('copy');
      field.remove();
    }
    function showCopied(btn){
      var label = btn.querySelector('.share-label');
      if(!label){ return; }
      var old = label.textContent;
      btn.classList.add('copied');
      label.textContent = 'Copied';
      window.clearTimeout(btn._shareTimer);
      btn._shareTimer = window.setTimeout(function(){
        label.textContent = old;
        btn.classList.remove('copied');
      }, 1600);
    }
    async function shareTrip(btn){
      var url = new URL(btn.getAttribute('data-share-url') || window.location.href, window.location.href).href;
      var title = btn.getAttribute('data-share-title') || document.title;
      try{
        if(navigator.share){
          await navigator.share({title:title, url:url});
          return;
        }
        await copyLink(url);
        showCopied(btn);
      }catch(err){
        if(!err || err.name !== 'AbortError'){
          await copyLink(url);
          showCopied(btn);
        }
      }
    }
  </script>
</body>
</html>
